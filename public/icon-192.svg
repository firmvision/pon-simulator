<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="#0f172a"/>
  <!-- Optical fiber arc (OLT -> splitter) -->
  <path d="M32 80 Q96 40 160 80" stroke="#3b82f6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Splitter diamond -->
  <polygon points="96,72 108,84 96,96 84,84" fill="#3b82f6"/>
  <!-- Drop fibers to ONUs -->
  <line x1="96" y1="96" x2="48" y2="140" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="80" y2="148" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="112" y2="148" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="144" y2="140" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- OLT box -->
  <rect x="16" y="60" width="28" height="40" rx="4" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="30" y="85" text-anchor="middle" fill="#93c5fd" font-size="7" font-family="monospace">OLT</text>
  <!-- ONU circles -->
  <circle cx="48" cy="152" r="9" fill="#15803d" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="80" cy="158" r="9" fill="#15803d" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="112" cy="158" r="9" fill="#15803d" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="144" cy="152" r="9" fill="#15803d" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Signal glow -->
  <circle cx="96" cy="84" r="18" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
</svg>
