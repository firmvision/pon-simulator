  <text x="136" y="378" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">ONU</text>
  <rect x="168" y="368" width="56" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="196" y="390" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">ONU</text>
  <rect x="228" y="372" width="56" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="256" y="394" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">ONU</text>
  <rect x="288" y="368" width="56" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="316" y="390" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">ONU</text>
  <rect x="348" y="356" width="56" height="36" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="376" y="378" text-anchor="middle" fill="#86efac" font-size="11" font-family="monospace">ONU</text>
